<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatFlow</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<main class="app-shell">
    <aside class="sidebar">
        <div class="brand">
            <div class="brand-mark">C</div>
            <div>
                <h1>ChatFlow</h1>
                <p>Spring Boot Chat</p>
            </div>
        </div>

        <section id="authPanel" class="panel">
            <div class="tabs">
                <button id="loginTab" class="tab active">Login</button>
                <button id="registerTab" class="tab">Register</button>
            </div>

            <form id="loginForm" class="form">
                <input id="loginUsername" type="text" placeholder="Username" required>
                <input id="loginPassword" type="password" placeholder="Password" required>
                <button type="submit">Login</button>
            </form>

            <form id="registerForm" class="form hidden">
                <input id="fullName" type="text" placeholder="Full name" required>
                <input id="registerUsername" type="text" placeholder="Username" required>
                <input id="email" type="email" placeholder="Email" required>
                <input id="registerPassword" type="password" placeholder="Password" required>
                <button type="submit">Create account</button>
            </form>
        </section>

        <section id="roomPanel" class="panel hidden">
            <div class="user-row">
                <div>
                    <span class="muted">Logged in as</span>
                    <strong id="currentUser"></strong>
                </div>
                <button id="logoutButton" class="ghost">Logout</button>
            </div>

            <form id="createRoomForm" class="room-form">
                <input id="roomName" type="text" placeholder="New room name" required>
                <button type="submit">Create</button>
            </form>

            <div class="room-header">
                <span>Rooms</span>
                <button id="refreshRooms" class="ghost">Refresh</button>
            </div>
            <div id="roomList" class="room-list"></div>
        </section>

        <p id="statusMessage" class="status"></p>
    </aside>

    <section class="chat-area">
        <header class="chat-header">
            <div>
                <span class="muted">Current room</span>
                <h2 id="activeRoomName">Select a room</h2>
            </div>
            <span id="memberCount" class="badge">0 members</span>
        </header>

        <div id="messages" class="messages">
            <div class="empty-state">
                <h3>Welcome to ChatFlow</h3>
                <p>Login, create or join a room, and start sending messages.</p>
            </div>
        </div>

        <form id="messageForm" class="message-form">
            <input id="messageInput" type="text" placeholder="Type a message..." disabled required>
            <button type="submit" disabled id="sendButton">Send</button>
        </form>
    </section>
</main>

<script src="script.js"></script>
</body>
</html>
